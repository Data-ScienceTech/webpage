<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 100">
  <!-- Shield Icon -->
  <g transform="translate(10, 10)">
    <!-- Shield background -->
    <path d="M40 5 L72 17 L72 40 C72 58 58 72 40 80 C22 72 8 58 8 40 L8 17 Z" 
          fill="#000000"/>
    
    <!-- Inner shield highlight -->
    <path d="M40 12 L64 22 L64 40 C64 54 54 64 40 70 C26 64 16 54 16 40 L16 22 Z" 
          fill="#000000" opacity="0.7"/>
    
    <!-- AI Neural nodes -->
    <circle cx="40" cy="32" r="5" fill="#FFFFFF"/>
    <circle cx="28" cy="46" r="3.5" fill="#FFFFFF"/>
    <circle cx="52" cy="46" r="3.5" fill="#FFFFFF"/>
    <circle cx="40" cy="58" r="3.5" fill="#FFFFFF"/>
    
    <!-- Connecting lines -->
    <line x1="40" y1="32" x2="28" y2="46" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>
    <line x1="40" y1="32" x2="52" y2="46" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>
    <line x1="28" y1="46" x2="40" y2="58" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>
    <line x1="52" y1="46" x2="40" y2="58" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>
  </g>
  
  <!-- Company Name -->
  <text x="100" y="42" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#000000">DATA SCIENCE</text>
  <text x="100" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500" fill="#000000" letter-spacing="3">TECHNOLOGIES</text>
  
  <!-- AI Security tagline -->
  <text x="100" y="92" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#000000" letter-spacing="1">AI SECURITY</text>
</svg>
